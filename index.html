<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Squat AI - Datchik</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 90vh; }
        .counter { font-size: 100px; font-weight: bold; color: #00d2ff; margin: 20px 0; }
        .status { font-size: 20px; color: #aaa; min-height: 30px; }
        .btn { background: #00d2ff; color: black; border: none; padding: 15px 40px; font-size: 18px; border-radius: 50px; cursor: pointer; font-weight: bold; width: 80%; margin: 10px 0; }
        .btn-finish { background: #ff4b2b; color: white; } /* Tugatish tugmasi rangi qizil */
        .instruction { font-size: 14px; color: #777; margin-top: 20px; padding: 0 20px; }
    </style>
</head>
<body>
    <div class="status" id="status">Tayyor bo'ling...</div>
    <div class="counter" id="counter">0</div>
    
    <button class="btn" id="startBtn" onclick="startTracking()">Mashqni boshlash</button>
    
    <button class="btn btn-finish" id="finishBtn" onclick="finishWorkout()" style="display: none;">Tugatish va saqlash</button>

    <p class="instruction" id="ins">Telefonni vertikal holatda ushlang yoki cho'ntagingizga soling.</p>

    <script>
        let count = 0;
        let stage = "up";
        const tg = window.Telegram.WebApp;
        tg.expand();

        function startTracking() {
            // "Boshlash" tugmasini yashiramiz va "Tugatish" tugmasini chiqaramiz
            document.getElementById("startBtn").style.display = "none";
            document.getElementById("finishBtn").style.display = "block";
            document.getElementById("status").innerText = "Harakatni boshlang!";
            
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(response => {
                    if (response == 'granted') {
                        window.addEventListener("deviceorientation", handleMotion);
                    }
                });
            } else {
                window.addEventListener("deviceorientation", handleMotion);
            }
        }

        function handleMotion(event) {
            let angle = event.beta; 

            if (angle > 70) {
                stage = "down";
                document.getElementById("status").innerText = "O'tirdingiz! ✅";
            }
            
            if (angle < 30 && stage === "down") {
                count++;
                stage = "up";
                document.getElementById("status").innerText = "Yaxshi! Turdingiz ⚡️";
                document.getElementById("counter").innerText = count;
                tg.HapticFeedback.impactOccurred('medium');
            }
        }

        // BOTGA MA'LUMOT YUBORISH FUNKSIYASI
        function finishWorkout() {
            if (count === 0) {
                alert("Kamida 1 marta mashq qilishingiz kerak!");
                return;
            }

            const data = {
                reps: count,
                type: "squat"
            };

            // Botga JSON formatda yuborish b
            tg.sendData(JSON.stringify(data));
            
            // Ilovani yopish
            tg.close();
        }
    </script>
</body>
</html>
