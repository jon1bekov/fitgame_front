<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FitGame - AI Squat</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --primary: #00d2ff; --bg: #121212; --card: #1e1e1e; --accent: #ff4b2b; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; height: 100vh; overflow: hidden; }
        
        .page { display: none; height: calc(100vh - 70px); padding: 20px; box-sizing: border-box; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }

        .counter { font-size: 100px; font-weight: bold; color: var(--primary); margin: 10px 0; }
        .status-text { font-size: 18px; color: #888; margin-bottom: 20px; height: 25px; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; height: 70px; box-sizing: border-box; }
        .nav-item { color: #555; cursor: pointer; display: flex; flex-direction: column; align-items: center; font-size: 12px; }
        .nav-item.active { color: var(--primary); }

        .btn { background: var(--primary); color: black; border: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; width: 85%; font-size: 18px; cursor: pointer; }
        .btn-finish { background: var(--accent); color: white; display: none; margin-top: 10px; }
        
        .stats-card { background: var(--card); width: 100%; border-radius: 15px; padding: 15px; margin: 5px 0; border: 1px solid #333; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="profile" class="page active">
        <h2>Profil</h2>
        <div class="stats-card">⭐ Daraja: 1</div>
        <div class="stats-card">⚡ XP: 450</div>
    </div>

    <div id="leaderboard" class="page">
        <h2>Reyting</h2>
        <div class="stats-card">1. Javohir - 2500</div>
        <div class="stats-card">2. Bekzod - 2100</div>
    </div>

    <div id="workout" class="page">
        <h2>Squat</h2>
        <div class="counter" id="main-count">0</div>
        <div class="status-text" id="status-display">Tayyormisiz?</div>
        <button class="btn" id="start-btn" onclick="startTracking()">Boshlash</button>
        <button class="btn btn-finish" id="finish-btn" onclick="sendDataToBot()">Tugatish</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="changePage('profile', this)"><span>👤</span><br>Profil</div>
        <div class="nav-item" onclick="changePage('leaderboard', this)"><span>🏆</span><br>Top</div>
        <div class="nav-item" onclick="changePage('workout', this)"><span>🏋️</span><br>Mashq</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let count = 0;
        let stage = "up";
        let isTracking = false;

        function changePage(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            stopTracking();
        }

        function startTracking() {
            count = 0;
            document.getElementById('main-count').innerText = count;
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('finish-btn').style.display = 'block';
            document.getElementById('status-display').innerText = "Harakatni boshlang!";
            isTracking = true;

            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(state => {
                    if (state === 'granted') window.addEventListener('deviceorientation', handleMotion);
                }).catch(e => alert("Ruxsatda xato: " + e));
            } else {
                window.addEventListener('deviceorientation', handleMotion);
            }
        }

        function stopTracking() {
            isTracking = false;
            window.removeEventListener('deviceorientation', handleMotion);
            document.getElementById('start-btn').style.display = 'block';
            document.getElementById('finish-btn').style.display = 'none';
        }

        function handleMotion(event) {
            if (!isTracking) return;
            let angle = event.beta; 

            if (angle > 70) {
                if (stage === "up") {
                    stage = "down";
                    document.getElementById('status-display').innerText = "Pastga... ✅";
                }
            }
            
            if (angle < 40 && stage === "down") {
                count++;
                stage = "up";
                document.getElementById('main-count').innerText = count;
                document.getElementById('status-display').innerText = "Yaxshi! 🔥";
                tg.HapticFeedback.impactOccurred('light');
            }
        }

        function sendDataToBot() {
            const result = { reps: count, type: "squat" };
            tg.sendData(JSON.stringify(result));
            tg.close();
        }
    </script>
</body>
</html>
